name: atom_sn_design_system
description: >-
  AtomSN — tema editorial 'newsprint' para Flutter
  (mobile-first + web, light/dark). Tokens DTCG en tokens/tokens.json.
version: 2.0.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # Iconografia unica del sistema: Hugeicons (estilo strokeRounded).
  hugeicons: ^1.1.7

flutter:
  # ElmsSans (variable, OFL): unica familia del sistema (sans + display).
  fonts:
    - family: ElmsSans
      fonts:
        - asset: assets/fonts/elms_sans/ElmsSans-VariableFont.ttf
        - asset: assets/fonts/elms_sans/ElmsSans-Italic-VariableFont.ttf
          style: italic
